<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #111; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overflow: hidden; }
/* iOS safe area */
#viewScreen { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
#importScreen { padding-top: max(1.25rem, env(safe-area-inset-top)); padding-bottom: env(safe-area-inset-bottom); }

/* ── IMPORT ── */
#importScreen { height: 100vh; overflow-y: auto; padding: 1.25rem; max-width: 600px; margin: 0 auto; }
.logo-wrap { text-align: center; margin-bottom: 1.25rem; padding-top: 0.5rem; }
.logo-wrap img { height: 44px; width: auto; }
.logo-wrap p { font-size: 11px; color: #555; margin-top: 5px; letter-spacing: 0.1em; }
.drop-area { border: 2px dashed #444; border-radius: 12px; padding: 1.25rem; text-align: center; cursor: pointer; background: #1a1a1a; margin-bottom: 1rem; display: block; position: relative; overflow: hidden; }
.drop-area:active { background: #222; }
.drop-area p { font-size: 13px; color: #888; margin-top: 6px; }
.drop-area input { display: none; }
.or-line { display: flex; align-items: center; gap: 10px; margin: 0.75rem 0; font-size: 12px; color: #555; }
.or-line::before, .or-line::after { content: ""; flex: 1; height: 1px; background: #333; }
textarea { width: 100%; min-height: 90px; background: #1a1a1a; border: 1px solid #444; border-radius: 10px; color: #fff; font-size: 12px; font-family: "Courier New", monospace; padding: 10px; resize: vertical; outline: none; display: block; }
textarea:focus { border-color: #666; }
.btn-row { display: flex; gap: 10px; margin-top: 0.75rem; }
.btn-primary { flex: 1; padding: 13px; background: #fff; color: #000; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-sample { padding: 13px 16px; background: #222; color: #aaa; border: 1px solid #444; border-radius: 10px; font-size: 13px; cursor: pointer; }
.err { margin-top: 0.75rem; padding: 12px; background: #3b0000; border-radius: 10px; color: #f87171; font-size: 13px; }

/* ── VIEW ── */
#viewScreen { display: none; height: 100vh; flex-direction: column; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #111; border-bottom: 1px solid #2a2a2a; flex-shrink: 0; gap: 6px; }

.topbar-center img { height: 18px; width: auto; opacity: 0.75; }
.slsr { display: flex; align-items: center; }
.btn-ds { background: #fff; color: #000; border: none; padding: 7px 12px; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.btn-slsr { background: #222; border: none; color: #fff; padding: 7px 10px; font-size: 13px; font-weight: 500; cursor: pointer; border-radius: 7px; }
.sep { color: #555; padding: 0 3px; font-size: 13px; }
.tb-btn { background: #222; border: 1px solid #444; color: #aaa; padding: 7px 10px; border-radius: 7px; font-size: 12px; cursor: pointer; white-space: nowrap; }
.tb-btn.active { background: #1050d0; color: #fff; border-color: #1050d0; }
.tb-btn.active-field { background: #1a3a1a; color: #6aba6a; border-color: #4a8a4a; }
.tb-btn.swap-active { background: #f5a020; color: #000; border-color: #f5a020; }
.total-bar { padding: 4px 12px; font-size: 10px; color: #555; border-bottom: 1px solid #222; text-align: center; flex-shrink: 0; }

/* ── LIST ── */
#listPane { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.grid { display: grid; grid-template-columns: 1fr 72px 1fr; }
.group-bar { display: flex; flex-wrap: wrap; gap: 5px; padding: 6px 10px; background: #0d0d0d; border-bottom: 1px solid #222; flex-shrink: 0; }
.grp-btn { background: #1a1a1a; border: 1px solid #333; color: #aaa; padding: 4px 10px; border-radius: 20px; font-size: 11px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.grp-btn.hidden { background: #111; color: #444; border-color: #222; text-decoration: line-through; }
.grp-btn.kg { border-style: dashed; }
.group-bar-empty { display: none; }
.col-hdr { background: #1a1a1a; padding: 4px 8px; font-size: 10px; color: #555; font-weight: 600; letter-spacing: 0.05em; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 5; }
.col-hdr.sl { text-align: right; border-right: 1px solid #222; }
.col-hdr.mid { text-align: center; }
.col-hdr.sr { text-align: left; border-left: 1px solid #222; }
.row-mid { background: #111; border-bottom: 1px solid #222; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5px 3px; min-height: 56px; }
.row-mid .dl { font-size: 9px; color: #666; font-weight: 600; letter-spacing: 0.06em; margin-bottom: 1px; }
.row-mid .yv { font-size: 17px; font-weight: 600; color: #fff; line-height: 1; }
.row-mid.null-row { background: #15803d; }
.row-mid.null-row .yv, .row-mid.null-row .dl { color: #fff; }
.row-mid.synthetic-mid { background: #14532d; opacity: 0.75; }
.cell.synthetic { opacity: 0.4; }
.cell { border-bottom: 1px solid #222; padding: 6px 8px; display: flex; align-items: center; min-height: 60px; }
.cell.sl { justify-content: flex-end; border-right: 1px solid #222; }
.cell.sr { justify-content: flex-start; border-left: 1px solid #222; }
.cell.multi-sl { gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
.cell.multi-sr { gap: 10px; flex-wrap: wrap; justify-content: flex-start; }
.mc { display: flex; align-items: center; gap: 6px; cursor: pointer; -webkit-user-select: none; user-select: none; padding: 3px 0; flex-shrink: 0; }
.mc.sl { flex-direction: row-reverse; }
.mc-meta { display: flex; flex-direction: column; min-width: 0; }
.mc.sl .mc-meta { align-items: flex-end; }
.mc-name { font-size: 15px; font-weight: 600; color: #fff; white-space: nowrap; display: block; line-height: 1.15; }
.mc-x { font-size: 14px; font-weight: 500; color: #fff; white-space: nowrap; display: block; line-height: 1.15; }
.mc-sub { font-size: 10px; color: #555; white-space: nowrap; display: block; margin-top: 1px; }
.mc-y  { font-size: 11px; color: #888; white-space: nowrap; display: block; line-height: 1.2; }
.mc.done .mc-name { color: #2a2a2a; text-decoration: line-through; }
.mc.done .mc-x { color: #2a2a2a; }
.mc.done .mc-sub { color: #1e1e1e; }
.mc.done svg { opacity: 0.12; }
.chk { width: 18px; min-width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #3a3a3a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.mc.done .chk { background: #16a34a; border-color: #16a34a; }
.chk-mark { display: none; width: 5px; height: 8px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
.mc.done .chk-mark { display: block; }

/* ── MAP ── */
#mapPane { display: none; flex: 1; position: relative; overflow: hidden; background: #0d0d0d; }
#mapCanvas { display: block; position: absolute; top: 0; left: 0; }
.map-overlay { position: absolute; pointer-events: none; z-index: 2; font-size: 10px; }
#mapLegend { bottom: 12px; right: 12px; background: rgba(0,0,0,0.7); border-radius: 7px; padding: 6px 10px; color: #888; }
#mapHint { bottom: 12px; left: 12px; color: #3a3a3a; }

.tab-bar { display: flex; flex-wrap: wrap; gap: 4px; padding: 5px 10px; background: #0d0d0d; border-bottom: 1px solid #1e1e1e; flex-shrink: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.tab-btn { background: #181818; border: 1px solid #2a2a2a; color: #666; padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s; letter-spacing: 0.04em; }

.tab-btn.all { color: #888; }
.tab-btn.active { background: #fff; color: #000; border-color: #fff; }

.tb-logo-row { display: flex; justify-content: center; align-items: center; }

@media print {
  body { background: #fff !important; color: #000 !important; margin: 0; }

  .grid { display: grid !important; grid-template-columns: 1fr 72px 1fr !important; }
  .cell { background: #fff !important; border: 1px solid #ddd !important; min-height: 44px; }
  .row-mid { background: #f0f0f0 !important; border: 1px solid #ccc !important; cursor: default; }
  .col-hdr { background: #e0e0e0 !important; color: #333 !important; border: 1px solid #ccc !important; }
  .yv { color: #000 !important; font-weight: 700; }
  .dl { color: #666 !important; }
  .mc-name { color: #000 !important; }
  .mc-x { color: #222 !important; }
  .mc-sub { color: #555 !important; }

  #mapPane { width: 100vw !important; height: 100vh !important; }
  #mapCanvas { width: 100% !important; height: 100% !important; }
}

<script>
// ---------------------------------------------
// BR SYMBOL SYSTEM
// ---------------------------------------------
function kgLabel(kg) {
  if (!kg || kg <= 0) return '';
  if (kg >= 1000) return (kg/1000).toFixed(1).replace('.',',') + 't';
  return kg + 'kg';
}

function weightToShape(kg) {
  if (kg <= 0)    return 'sq';
  if (kg <= 400)  return 'dia';   // ~0,25t: bis 400kg
  if (kg <= 800)  return 'tri';   // ~0,5t:  bis 800kg
  if (kg <= 1500) return 'circ';  // ~1t:    bis 1500kg
  return 'sq';                    // ~2t+:   ab 1500kg
}
function weightToColors(kg) {
  if (kg <= 0)    return { a:'#555' };
  if (kg <= 125)  return { a:'#b8dc30' };
  if (kg <= 160)  return { a:'#70c8e8' };
  if (kg <= 200)  return { a:'#50b0d0' };
  if (kg <= 250)  return { a:'#28a030' };
  if (kg <= 320)  return { a:'#b89040' };
  if (kg <= 500)  return { a:'#f09010' };
  if (kg <= 750)  return { a:'#00a8c0' };
  if (kg <= 1000) return { a:'#e01050' };
  if (kg <= 1250) return { a:'#909090' };
  if (kg <= 1500) return { a:'#8818b0' };
  if (kg <= 2000) return { a:'#1050d0' };
  return              { a:'#d060d0' };
}
function brSVG(name, kg, pre, S) {
  S = S || 30;
  const isDH = name && name.toUpperCase().startsWith('DH');
  const shape = isDH ? 'dh' : weightToShape(kg);
  // Accent color per shape
  const A = { dia:'#28a030', tri:'#f07020', circ:'#e01050', sq:'#3355dd', dh:'#666' }[shape] || '#888';
  const Y = '#f0e040'; // yellow
  const ow = pre ? 2.2 : 1.2;
  const oc = pre ? '#e82020' : '#333';
  const cx = S/2, cy = S/2;
  const uid = (Math.random()*1e6|0).toString(36);

  if (shape === 'dia') {
    // 4 diagonal triangles: top=A, right=Y, bottom=A, left=Y
    // Actually from image: top-left=A, top-right=Y, bottom-left=Y, bottom-right=A
    const m = ow/2 + 0.5;
    const T=`${cx},${m}`, R=`${S-m},${cy}`, B=`${cx},${S-m}`, L=`${m},${cy}`, C=`${cx},${cy}`;
    return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}">
      <polygon points="${T} ${L} ${C}" fill="${A}"/>
      <polygon points="${T} ${R} ${C}" fill="${Y}"/>
      <polygon points="${R} ${B} ${C}" fill="${A}"/>
      <polygon points="${B} ${L} ${C}" fill="${Y}"/>
      <polygon points="${T} ${R} ${B} ${L}" fill="none" stroke="${oc}" stroke-width="${ow}" stroke-linejoin="round"/>
      <line x1="${cx}" y1="${m}" x2="${m}" y2="${cy}" stroke="${oc}" stroke-width="${ow*0.4}" opacity="0.5"/>
      <line x1="${cx}" y1="${m}" x2="${S-m}" y2="${cy}" stroke="${oc}" stroke-width="${ow*0.4}" opacity="0.5"/>
      <line x1="${m}" y1="${cy}" x2="${cx}" y2="${S-m}" stroke="${oc}" stroke-width="${ow*0.4}" opacity="0.5"/>
      <line x1="${S-m}" y1="${cy}" x2="${cx}" y2="${S-m}" stroke="${oc}" stroke-width="${ow*0.4}" opacity="0.5"/>
    </svg>`;
  }

  if (shape === 'tri') {
    // 3 segments: top=Y, bottom-left=A, bottom-right=A (from image: left+right=orange, top=yellow)
    const m = ow/2 + 0.5;
    const tx=cx, ty=m, bl=m, br=S-m, by=S-m;
    // centroid
    const gcx=(tx+bl+br)/3, gcy=(ty+by+by)/3;
    // mid-bottom edge
    const mx2=(bl+br)/2;
    return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}">
      <polygon points="${tx},${ty} ${mx2},${gcy} ${bl},${by}" fill="${A}"/>
      <polygon points="${tx},${ty} ${br},${by} ${mx2},${gcy}" fill="${Y}"/>
      <polygon points="${tx},${ty} ${mx2},${gcy} ${br},${by} ${bl},${by}" fill="none"/>
      <polygon points="${tx},${ty} ${bl},${by} ${br},${by}" fill="none" stroke="${oc}" stroke-width="${ow}" stroke-linejoin="round"/>
      <line x1="${tx}" y1="${ty}" x2="${mx2}" y2="${gcy}" stroke="${oc}" stroke-width="${ow*0.4}" opacity="0.5"/>
      <line x1="${bl}" y1="${by}" x2="${mx2}" y2="${gcy}" stroke="${oc}" stroke-width="${ow*0.4}" opacity="0.5"/>
      <line x1="${br}" y1="${by}" x2="${mx2}" y2="${gcy}" stroke="${oc}" stroke-width="${ow*0.4}" opacity="0.5"/>
      <polygon points="${tx},${ty} ${bl},${by} ${br},${by}" fill="none" stroke="${oc}" stroke-width="${ow}" stroke-linejoin="round"/>
    </svg>`;
  }

  if (shape === 'circ') {
    // 4 quadrants: top-left=A, top-right=Y, bottom-left=Y, bottom-right=A
    const r = S/2 - ow/2 - 0.5;
    return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}">
      <clipPath id="cc${uid}"><circle cx="${cx}" cy="${cy}" r="${r}"/></clipPath>
      <rect x="${ow}" y="${ow}" width="${cx-ow}" height="${cy-ow}" fill="${A}" clip-path="url(#cc${uid})"/>
      <rect x="${cx}" y="${ow}" width="${cx-ow}" height="${cy-ow}" fill="${Y}" clip-path="url(#cc${uid})"/>
      <rect x="${ow}" y="${cy}" width="${cx-ow}" height="${cy-ow}" fill="${Y}" clip-path="url(#cc${uid})"/>
      <rect x="${cx}" y="${cy}" width="${cx-ow}" height="${cy-ow}" fill="${A}" clip-path="url(#cc${uid})"/>
      <line x1="${cx}" y1="${ow}" x2="${cx}" y2="${S-ow}" stroke="${oc}" stroke-width="${ow*0.4}" opacity="0.5"/>
      <line x1="${ow}" y1="${cy}" x2="${S-ow}" y2="${cy}" stroke="${oc}" stroke-width="${ow*0.4}" opacity="0.5"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${oc}" stroke-width="${ow}"/>
    </svg>`;
  }

  if (shape === 'sq') {
    // 4 quadrants: top-left=A, top-right=Y, bottom-left=Y, bottom-right=A
    const p = ow/2 + 0.5;
    return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}">
      <rect x="${p}" y="${p}" width="${cx-p}" height="${cy-p}" fill="${A}"/>
      <rect x="${cx}" y="${p}" width="${cx-p}" height="${cy-p}" fill="${Y}"/>
      <rect x="${p}" y="${cy}" width="${cx-p}" height="${cy-p}" fill="${Y}"/>
      <rect x="${cx}" y="${cy}" width="${cx-p}" height="${cy-p}" fill="${A}"/>
      <line x1="${cx}" y1="${p}" x2="${cx}" y2="${S-p}" stroke="${oc}" stroke-width="${ow*0.4}" opacity="0.5"/>
      <line x1="${p}" y1="${cy}" x2="${S-p}" y2="${cy}" stroke="${oc}" stroke-width="${ow*0.4}" opacity="0.5"/>
      <rect x="${p}" y="${p}" width="${S-p*2}" height="${S-p*2}" fill="none" stroke="${oc}" stroke-width="${ow}"/>
    </svg>`;
  }

  if (shape === 'dh') {
    // Deadhang: circle, gray
    const r = S/2 - ow/2 - 0.5;
    return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="${A}" stroke="${oc}" stroke-width="${ow}"/>
      <line x1="${cx}" y1="${ow+2}" x2="${cx}" y2="${S-ow-2}" stroke="${oc}" stroke-width="${ow*0.5}" opacity="0.4"/>
      <line x1="${ow+2}" y1="${cy}" x2="${S-ow-2}" y2="${cy}" stroke="${oc}" stroke-width="${ow*0.5}" opacity="0.4"/>
    </svg>`;
  }

  return `<svg width="${S}" height="${S}" viewBox="0 0 ${S} ${S}"><circle cx="${cx}" cy="${cy}" r="${S/2-2}" fill="${A}" stroke="${oc}" stroke-width="${ow}"/></svg>`;
}

// Legend

// ---------------------------------------------
// STATE
// ---------------------------------------------
let dirUp = true;
let swapXY = false;
let snapY = false;
let refOffsetX = 0, refOffsetY = 0; // reference offset
let showFields = { id: true, name: false, x: true, y: false, kg: false, trim: true, basket: false, sym: true };
let lastRaw = '';
let hiddenGroups = new Set();
let hiddenTabs = new Set(); // prefixes that are HIDDEN
let hiddenKgGroups = new Set();
let lastGroups = [];
const doneSet = new Set();
let mapVisible = false;
let mapScale = 1, mapOffX = 0, mapOffY = 0;
let mapDragging = false, mapDragX = 0, mapDragY = 0;
let mapPinchDist = 0;
let mapNeedsInit = true;

// ---------------------------------------------
// CSV PARSE
// ---------------------------------------------

function parseCSV(raw) {
  const lines = raw.trim().split(/[\r\n]+/).filter(l => l.trim());
  if (lines.length < 2) throw new Error('CSV zu kurz.');
  const sep = lines[0].includes(';') ? ';' : ',';
  const h = lines[0].split(sep).map(s => s.trim().toLowerCase());
  const fi = ns => {
    for (const n of ns) {
      const idx = h.findIndex(hh => hh === n || hh.includes(n));
      if (idx >= 0) return idx;
    }
    return -1;
  };
  const iX    = fi(['x-pos','x_pos','x pos','x']);
  const iY    = fi(['y-pos','y_pos','y pos','y']);
  const iN    = fi(['motortyp','type','typ','name','bezeichnung']);
  const iId   = fi(['kettenzug-id','id','kettenzug','kz-id']);
  const iT    = fi(['tragfahigkeit','tragfaehigkeit','tragf','capacity','swl','load','lagerkraft','traglast']);
  const iTrim = fi(['trimhoehe','rigginghoehe','rigginghoehe','riggingh','rigging','hoehe','trim','hook height','hookheight']);
  const iBas  = fi(['basket','korb','basketsize']);
  if (iX < 0 || iY < 0) throw new Error('Keine X/Y-Spalten gefunden.');
  const motors = [];
  for (let r = 1; r < lines.length; r++) {
    const c = lines[r].split(sep).map(s => s.trim());
    let x = parseFloat(c[iX] ? c[iX].replace(',','.') : '');
    let y = parseFloat(c[iY] ? c[iY].replace(',','.') : '');
    if (isNaN(x) || isNaN(y)) continue;
    if (swapXY) { const t = x; x = y; y = t; }
    if (snapY) { x = Math.round(x*20)/20; y = Math.round(y*20)/20; }
    const kgRaw  = iT    >= 0 ? (c[iT]    || '0') : '0';
    const kg     = parseFloat(kgRaw.replace(/[^0-9,.-]/g,'').replace(',','.')) || 0;
    const trRaw  = iTrim >= 0 ? (c[iTrim]  || '')  : '';
    const trim   = trRaw.replace(/[^0-9,.-]/g,'').replace(',','.');
    const basket = iBas  >= 0 ? (c[iBas]   || '')  : '';
    const name   = iN    >= 0 ? (c[iN]     || '')  : '';
    const id     = iId   >= 0 ? (c[iId]    || String(r)) : String(r);
    motors.push({ id, name, x: x - refOffsetX, y: y - refOffsetY, kg: isNaN(kg) ? 0 : kg, trim, basket });
  }
  if (!motors.length) throw new Error('Keine gueltigen Punkte.');
  return motors;
}

function groupByY(motors) {
  const TOL = 0.06;
  const sorted = [...motors].sort((a,b) => a.y - b.y);
  const groups = [];
  for (const m of sorted) {
    const g = groups.find(g => Math.abs(g.y - m.y) <= TOL);
    if (g) g.motors.push(m); else groups.push({ y: m.y, motors: [m] });
  }
  return groups;
}
function slSrSplit(motors) {
  if (!motors.length) return { sl:[], sr:[] };
  const xs = motors.map(m => m.x);
  const cx = (Math.min(...xs) + Math.max(...xs)) / 2;
  // SR = negative X -> left column: sort ascending (-8, -5, -2.5)
  const sl = motors.filter(m => m.x < cx).sort((a,b) => a.x - b.x);
  // SL = positive X -> right column: sort ascending (+2.5, +5, +8)
  const sr = motors.filter(m => m.x >= cx).sort((a,b) => a.x - b.x);
  return { sl, sr };
}
function dsLabel(y, allY) {
  if (Math.abs(y) < 0.06) return 'NULL';
  return '';  // no DS/US label on regular rows
}
function motorKey(m) { return (m.id + '_' + m.name).replace(/'/g,''); }

// ---------------------------------------------
// LIST RENDERING
// ---------------------------------------------
function chipHtml(m, side) {
  const pre = m.name && m.name.toLowerCase().includes('pre');
  const icon = brSVG(m.name, m.kg, pre, 26);
  // Round X to nearest 5cm
  const xRounded = Math.round(m.x*20)/20;
  const xStr = (xRounded >= 0 ? '+' : '') + xRounded.toFixed(2) + 'm';
  const kgStr = m.kg > 0 ? (m.kg >= 1000 ? (m.kg/1000).toFixed(1)+'t' : m.kg+'kg') : '';
  const isSL = side === 'sr';  // SR array = right col = SL motors = icon right of text
  const key = motorKey(m);
  const isDone = doneSet.has(key);
  // Build sub line from visible fields
  const subParts = [];
  if (showFields.name && (m.name || '')) subParts.push(m.name || '');
  if (showFields.kg && kgStr) subParts.push(kgStr);
  const trimVal = (m.trim || '').trim();
  if (showFields.trim && trimVal) subParts.push('\u2195' + parseFloat(trimVal).toFixed(2) + 'm');
  if (showFields.basket && m.basket) subParts.push('\u2B21' + m.basket);
  const subLine = subParts.join(' \u00b7 ');
  return `<div class="mc${isSL?' sl':''}${isDone?' done':''}" onclick="toggleDone('${key}',this)">
    ${showFields.sym ? icon : ''}
    <div class="mc-meta">
      ${showFields.id ? `<span class="mc-name">#${m.id}</span>` : ''}
      ${showFields.x  ? `<span class="mc-x">${xStr}</span>` : ''}
      ${showFields.y  ? `<span class="mc-y">${m.y.toFixed(2)}m</span>` : ''}
      ${subLine ? `<span class="mc-sub">${subLine}</span>` : ''}
    </div>
    <div class="chk"><div class="chk-mark"></div></div>
  </div>`;
}
function renderGrid(groups) {
  const allY = groups.map(g => g.y);
  // Check if a NULL row (Y=0) already exists
  const hasNull = groups.some(g => Math.abs(g.y) < 0.06);
  // Build ordered list, inject NULL row if missing
  let working = [...groups];
  if (!hasNull) {
    working.push({ y: 0, motors: [], synthetic: true });
  }
  working.sort((a, b) => a.y - b.y);
  const allYwith = working.map(g => g.y);
  const ordered = dirUp ? [...working].reverse() : [...working];
  let html = '';
  for (const g of ordered) {
    const { sl, sr } = slSrSplit(g.motors);
    const label = dsLabel(g.y, allYwith);
    const isNull = label === 'NULL';
    const slHtml = sl.filter(Boolean).map(m => chipHtml(m,'sl')).join('');
    const srHtml = sr.filter(Boolean).map(m => chipHtml(m,'sr')).join('');
    html += `<div class="cell sl multi-sl${g.synthetic?' synthetic':''}">${slHtml}</div>`;
    const rowAllDone = g.motors.length > 0 && g.motors.every(m => doneSet.has(motorKey(m)));
    html += `<div class="row-mid${isNull?' null-row':''}${g.synthetic?' synthetic-mid':''}${rowAllDone?' row-done':''}" onclick="toggleRow(${g.y})">
      <span class="dl">${label}</span>
      <span class="yv">${g.y.toFixed(2)}m</span>
      ${g.motors.length > 0 ? `<div class="row-chk${rowAllDone?' row-chk-on':''}"></div>` : ''}
    </div>`;
    html += `<div class="cell sr multi-sr${g.synthetic?' synthetic':''}">${srHtml}</div>`;
  }
  return html;
}

// ---------------------------------------------
// MAP RENDERING
// ---------------------------------------------
function niceStep(raw) {
  const mag = Math.pow(10, Math.floor(Math.log10(raw)));
  const n = raw / mag;
  return n < 1.5 ? mag : n < 3.5 ? 2*mag : n < 7.5 ? 5*mag : 10*mag;
}

function drawMapSymbol(ctx, m, cx, cy, S, pre, isDone) {
  const isDH = m.name && m.name.toUpperCase().startsWith('DH');
  const shape = isDH ? 'dh' : weightToShape(m.kg);
  const shapeColor = {dia:'#28a030',tri:'#f07020',circ:'#e01050',sq:'#1050d0',dh:'#606060'}[shape]||'#888';
  const A = shapeColor;
  const Y = '#f0e040';
  const ow = pre ? 2 : 1.2;
  const oc = pre ? '#e82020' : '#333';
  const r = S/2;
  const alpha = isDone ? 0.18 : 1;

  ctx.save();
  ctx.globalAlpha = alpha;

  if (shape === 'dia') {
    // 4 diagonal triangles
    const m2 = ow/2;
    const T=[cx,cy-r+m2], R2=[cx+r-m2,cy], B=[cx,cy+r-m2], L=[cx-r+m2,cy], C2=[cx,cy];
    [[T,L,C2,A],[T,R2,C2,Y],[R2,B,C2,A],[B,L,C2,Y]].forEach(([p1,p2,p3,fill]) => {
      ctx.beginPath(); ctx.moveTo(p1[0],p1[1]); ctx.lineTo(p2[0],p2[1]); ctx.lineTo(p3[0],p3[1]); ctx.closePath();
      ctx.fillStyle = fill; ctx.fill();
    });
    ctx.beginPath(); ctx.moveTo(T[0],T[1]); ctx.lineTo(R2[0],R2[1]); ctx.lineTo(B[0],B[1]); ctx.lineTo(L[0],L[1]); ctx.closePath();
    ctx.strokeStyle=oc; ctx.lineWidth=ow; ctx.stroke();
  } else if (shape === 'tri') {
    const m2=ow/2, tx=cx, ty=cy-r+m2, bl=cx-r+m2, br=cx+r-m2, by=cy+r-m2;
    const mx2=(bl+br)/2, mcy=(ty+by+by)/3;
    [[tx,ty,mx2,mcy,bl,by,A],[tx,ty,br,by,mx2,mcy,Y]].forEach(([x1,y1,x2,y2,x3,y3,fill]) => {
      ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.lineTo(x3,y3); ctx.closePath();
      ctx.fillStyle=fill; ctx.fill();
    });
    ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(bl,by); ctx.lineTo(br,by); ctx.closePath();
    ctx.strokeStyle=oc; ctx.lineWidth=ow; ctx.stroke();
  } else if (shape === 'circ') {
    const rr = r - ow/2;
    ctx.save(); ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2); ctx.clip();
    [[cx-rr,cy-rr,rr,rr,A],[cx,cy-rr,rr,rr,Y],[cx-rr,cy,rr,rr,Y],[cx,cy,rr,rr,A]].forEach(([x,y,w,h,fill]) => {
      ctx.fillStyle=fill; ctx.fillRect(x,y,w,h);
    });
    ctx.restore();
    ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2);
    ctx.strokeStyle=oc; ctx.lineWidth=ow; ctx.stroke();
  } else if (shape === 'sq') {
    const p=ow/2;
    [[cx-r+p,cy-r+p,r-p,r-p,A],[cx,cy-r+p,r-p,r-p,Y],[cx-r+p,cy,r-p,r-p,Y],[cx,cy,r-p,r-p,A]].forEach(([x,y,w,h,fill]) => {
      ctx.fillStyle=fill; ctx.fillRect(x,y,w,h);
    });
    ctx.strokeStyle=oc; ctx.lineWidth=ow;
    ctx.strokeRect(cx-r+p,cy-r+p,(r-p)*2,(r-p)*2);
  } else {
    // dh: simple circle
    ctx.beginPath(); ctx.arc(cx,cy,r-ow/2,0,Math.PI*2);
    ctx.fillStyle=A; ctx.fill();
    ctx.strokeStyle=oc; ctx.lineWidth=ow; ctx.stroke();
  }

  ctx.restore();
}

function drawMap() {
  const canvas = document.getElementById('mapCanvas');
  const pane = document.getElementById('mapPane');
  const rect = pane.getBoundingClientRect();
  const W = Math.floor(rect.width);
  const H = Math.floor(rect.height);
  if (W < 20 || H < 20) { requestAnimationFrame(drawMap); return; }
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0, 0, W, H);

  if (!lastGroups.length) return;
  const allM = lastGroups.flatMap(g => g.motors);
  if (!allM.length) return;

  const xs = allM.map(m => m.x), ys = allM.map(m => m.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const rangeX = maxX - minX || 2, rangeY = maxY - minY || 2;
  const PAD = 48;

  // Auto-fit on first open: compute base scale so all points fill viewport
  if (mapNeedsInit) {
    mapNeedsInit = false;
    mapScale = 1;
    mapOffX = 0;
    mapOffY = 0;
  }

  const fitScaleX = (W - PAD * 2) / rangeX;
  const fitScaleY = (H - PAD * 2) / rangeY;
  const fitScale = Math.min(fitScaleX, fitScaleY);
  const scale = fitScale * mapScale;

  // Center offset: pan keeps data center in canvas center + user offset
  const midX = (minX + maxX) / 2;
  const midY = (minY + maxY) / 2;
  const ox = W/2 - midX * scale + mapOffX;
  const oy = H/2 + midY * scale + mapOffY;
  function tc(x, y) { return [ox + x*scale, oy - y*scale]; }

  // -- Grid --
  const step = niceStep(Math.max(rangeX, rangeY) / 5);
  const gxS = Math.floor((minX - step) / step) * step;
  const gyS = Math.floor((minY - step) / step) * step;
  ctx.strokeStyle = '#1e1e1e'; ctx.lineWidth = 1;
  ctx.setLineDash([2,5]);
  for (let gx = gxS; gx <= maxX+step*2; gx += step) {
    const [cx] = tc(gx, 0); if (cx < -2 || cx > W+2) continue;
    ctx.beginPath(); ctx.moveTo(cx,0); ctx.lineTo(cx,H); ctx.stroke();
  }
  for (let gy = gyS; gy <= maxY+step*2; gy += step) {
    const [,cy] = tc(0, gy); if (cy < -2 || cy > H+2) continue;
    ctx.beginPath(); ctx.moveTo(0,cy); ctx.lineTo(W,cy); ctx.stroke();
  }
  ctx.setLineDash([]);

  // -- Axes --
  const [zx, zy] = tc(0, 0);
  ctx.strokeStyle = '#2e2e2e'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(zx,0); ctx.lineTo(zx,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,zy); ctx.lineTo(W,zy); ctx.stroke();

  // NULL highlight
  ctx.strokeStyle = '#15803d'; ctx.lineWidth = 1.5;
  ctx.setLineDash([8,5]);
  ctx.beginPath(); ctx.moveTo(0,zy); ctx.lineTo(W,zy); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = '#15803d'; ctx.font = '10px -apple-system,sans-serif'; ctx.textAlign='left';
  ctx.fillText('Y=0', 5, zy-4);

  // -- Grid labels --
  ctx.fillStyle = '#333'; ctx.font = '10px -apple-system,sans-serif';
  ctx.textAlign = 'center';
  for (let gx = gxS; gx <= maxX+step*2; gx += step) {
    const [cx] = tc(gx,0); if (cx < 16 || cx > W-8) continue;
    const ly = Math.max(12, Math.min(H-3, zy+12));
    ctx.fillText(gx.toFixed(1)+'m', cx, ly);
  }
  ctx.textAlign = 'right';
  for (let gy = gyS; gy <= maxY+step*2; gy += step) {
    const [,cy] = tc(0,gy); if (cy < 8 || cy > H-4) continue;
    const lx = Math.max(26, Math.min(W-4, zx-4));
    ctx.fillText(gy.toFixed(1)+'m', lx, cy+3);
  }

  // -- Y-row connectors --
  for (const g of lastGroups) {
    if (g.motors.length < 2) continue;
    const sm = [...g.motors].sort((a,b)=>a.x-b.x);
    const [lx,ly] = tc(sm[0].x, g.y);
    const [rx]   = tc(sm[sm.length-1].x, g.y);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(rx,ly); ctx.stroke();
  }

  // -- Motors: done behind, active in front --
  const sorted = [...allM].sort((a,b) => {
    const ad = doneSet.has(motorKey(a)), bd = doneSet.has(motorKey(b));
    return ad === bd ? 0 : ad ? -1 : 1;
  });

  const SZ = 28;
  const R  = SZ / 2;

  for (const m of sorted) {
    const [px,py] = tc(m.x, m.y);
    if (px < -40 || px > W+40 || py < -40 || py > H+40) continue;
    const isDone = doneSet.has(motorKey(m));
    const pre = m.name && m.name.toLowerCase().includes('pre');
    const alpha = isDone ? 0.18 : 1;

    ctx.globalAlpha = alpha;

    // Draw symbol directly on canvas using same logic as brSVG
    drawMapSymbol(ctx, m, px, py, SZ, pre, isDone);

    ctx.globalAlpha = 1;

    // Label
    const lbl = m.id || '';
    if (lbl) {
      const fs = 9;
      ctx.font = `600 ${fs}px -apple-system,sans-serif`;
      const tw = ctx.measureText(lbl).width;
      const ly2 = py - R - 2;
      ctx.globalAlpha = isDone ? 0.25 : 1;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(px-tw/2-2, ly2-fs, tw+4, fs+2, 2);
      else ctx.rect(px-tw/2-2, ly2-fs, tw+4, fs+2);
      ctx.fill();
      ctx.fillStyle = isDone ? '#555' : '#fff';
      ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
      ctx.fillText(lbl, px, ly2+1);
      ctx.textBaseline = 'alphabetic';
      ctx.globalAlpha = 1;
    }
  }

  // Legend
  const total = allM.length, done = doneSet.size;
  document.getElementById('mapLegend').textContent =
    done > 0 ? `${done}/${total} abgehakt` : `${total} Punkte`;
}

// ---------------------------------------------
// UI ACTIONS
// ---------------------------------------------
function updateTotalBar() {
  const total = lastGroups.reduce((s,g) => s+g.motors.length, 0);
  const done = doneSet.size;
  const ex = swapXY ? ' \u00b7 X\u2194Y' : '';
  document.getElementById('totalBar').textContent =
    done > 0 ? `${done}/${total} abgehakt \u00b7 ${lastGroups.length} Ebenen${ex}`
             : `${total} Punkte \u00b7 ${lastGroups.length} Y-Ebenen${ex}`;
}
function toggleDone(key, el) {
  if (doneSet.has(key)) { doneSet.delete(key); el.classList.remove('done'); }
  else { doneSet.add(key); el.classList.add('done'); }
  updateTotalBar();
  if (mapVisible) drawMap();
}
function resetDone() {
  doneSet.clear();
  document.querySelectorAll('.mc.done').forEach(e => e.classList.remove('done'));
  updateTotalBar();
  if (mapVisible) drawMap();
}
function toggleDir() {
  dirUp = !dirUp;
  document.getElementById('dirBtn').textContent = dirUp ? '\u2191 DS' : '\u2193 US';
  document.getElementById('gridBody').innerHTML = renderGrid(lastGroups);
}

// Extract name prefix (letters before first digit/dot/space)
function extractPrefix(nameOrMotor) {
  // Accept either a string (legacy) or a motor object
  const s = (typeof nameOrMotor === 'object' && nameOrMotor !== null)
    ? (nameOrMotor.id || nameOrMotor.name || '')
    : (nameOrMotor || '');
  if (!s) return '?';
  const m = s.match(/^([A-Za-z]+)/);
  return m ? m[1].toUpperCase() : s.slice(0,3).toUpperCase();
}

function updateGroupBar(motors) {
  const prefixes = [...new Set(motors.map(m => extractPrefix(m)))].sort();
  const bar = document.getElementById('groupBar');
  if (prefixes.length <= 1) {
    if (!bar) return;
  bar.className = 'group-bar group-bar-empty';
    bar.innerHTML = '';
    return;
  }
  if (!bar) return;
  bar.className = 'group-bar';
  bar.innerHTML = '<span style="font-size:10px;color:#555;align-self:center;margin-right:4px">FILTER:</span>' +
    prefixes.map(p => {
      const hidden = hiddenGroups.has(p);
      return `<button class="grp-btn${hidden?' hidden':''}" onclick="toggleGroup('${p}')">${p}</button>`;
    }).join('');
}

function toggleGroup(prefix) {
  if (hiddenGroups.has(prefix)) hiddenGroups.delete(prefix);
  else hiddenGroups.add(prefix);
  // Re-render with filter applied
  const allM2 = parseCSV(lastRaw);
  const filtered = groupByY(allM2.filter(m => {
    if (hiddenTabs.has(extractPrefix(m))) return false;
    if (hiddenGroups.has(extractPrefix(m))) return false;
    if (hiddenKgGroups.has(kgGroupLabel(m.kg))) return false;
    return true;
  }));
  document.getElementById('gridBody').innerHTML = renderGrid(filtered);
  updateGroupBar(allM2);
  updateKgBar(allM2);
  if (mapVisible) { mapNeedsInit = true; drawMap(); }
}

function kgGroupLabel(kg) {
  if (kg <= 250)  return '<=0,25t';
  if (kg <= 500)  return '<=0,5t';
  if (kg <= 1000) return '<=1t';
  if (kg <= 2000) return '<=2t';
  return '>2t';
}

function updateKgBar(motors) {
  const bar = document.getElementById('groupBar');
  if (!bar) return;
  const kgLabels = [...new Set(motors.map(m => kgGroupLabel(m.kg)))];
  // only show if more than 1 kg group
  if (kgLabels.length <= 1) return;
  const sep = '<span style="width:1px;background:#222;align-self:stretch;margin:0 2px"></span>';
  bar.innerHTML += sep + kgLabels.sort().map(l => {
    const hidden = hiddenKgGroups.has(l);
    return `<button class="grp-btn kg${hidden?' hidden':''}" onclick="toggleKgGroup('${l}')">${l}</button>`;
  }).join('');
}

function toggleKgGroup(label) {
  if (hiddenKgGroups.has(label)) hiddenKgGroups.delete(label);
  else hiddenKgGroups.add(label);
  const all = parseCSV(lastRaw);
  const filtered = all.filter(m => {
    if (hiddenTabs.has(extractPrefix(m))) return false;
    if (hiddenGroups.has(extractPrefix(m))) return false;
    if (hiddenKgGroups.has(kgGroupLabel(m.kg))) return false;
    return true;
  });
  document.getElementById('gridBody').innerHTML = renderGrid(groupByY(filtered));
  updateGroupBar(all);
  updateKgBar(all);
  if (mapVisible) { mapNeedsInit = true; drawMap(); }
}

function updateTabBar(motors) {
  const bar = document.getElementById('tabBar');
  if (!bar) return;
  const prefixes = [...new Set(motors.map(m => extractPrefix(m)))].sort();
  if (prefixes.length <= 1) {
    bar.className = 'tab-bar tab-bar-empty';
    bar.innerHTML = '';
    return;
  }
  bar.className = 'tab-bar';
  const allOn = hiddenTabs.size === 0;
  bar.innerHTML =
    `<button class="tab-btn all${allOn ? ' active' : ''}" onclick="setTab(null)">Alle</button>` +
    prefixes.map(p => {
      const on = !hiddenTabs.has(p);
      return `<button class="tab-btn${on ? ' active' : ''}" onclick="setTab('${p}')">${p}</button>`;
    }).join('');
}

function setTab(prefix) {
  if (prefix === null) {
    hiddenTabs.clear(); // show all
  } else {
    if (hiddenTabs.has(prefix)) {
      hiddenTabs.delete(prefix); // was hidden -> show
    } else {
      hiddenTabs.add(prefix); // was shown -> hide
    }
  }
  if (!lastRaw) return;
  const all = parseCSV(lastRaw);
  updateTabBar(all);
  updateGroupBar(all);
  updateKgBar(all);
  const filtered = all.filter(m => {
    if (hiddenTabs.has(extractPrefix(m))) return false;
    if (hiddenGroups.has(extractPrefix(m))) return false;
    if (hiddenKgGroups.has(kgGroupLabel(m.kg))) return false;
    return true;
  });
  lastGroups = groupByY(filtered);
  document.getElementById('gridBody').innerHTML = renderGrid(lastGroups);
  if (mapVisible) { mapNeedsInit = true; drawMap(); }
}

function rowMotorKeys(y) {
  // Find all motors at this Y in lastGroups
  const group = lastGroups.find(g => Math.abs(g.y - y) < 0.06);
  if (!group) return [];
  return group.motors.map(m => motorKey(m));
}

function toggleRow(y) {
  const keys = rowMotorKeys(y);
  if (!keys.length) return;
  // Check if all are done
  const allDone = keys.every(k => doneSet.has(k));
  if (allDone) {
    keys.forEach(k => doneSet.delete(k));
  } else {
    keys.forEach(k => doneSet.add(k));
  }
  // Re-render grid and update chips
  document.getElementById('gridBody').innerHTML = renderGrid(lastGroups);
  updateTotalBar();
  if (mapVisible) drawMap();
}

function toggleField(key) {
  showFields[key] = !showFields[key];
  const btn = document.getElementById('fld-' + key);
  if (btn) btn.classList.toggle('active-field', showFields[key]);
  if (lastRaw) {
    const fresh = parseCSV(lastRaw).filter(m => {
      if (hiddenTabs.has(extractPrefix(m))) return false;
      if (hiddenGroups.has(extractPrefix(m))) return false;
      if (hiddenKgGroups.has(kgGroupLabel(m.kg))) return false;
      return true;
    });
    lastGroups = groupByY(fresh);
    document.getElementById('gridBody').innerHTML = renderGrid(lastGroups);
    if (mapVisible) drawMap();
  }
}




function toggleSwap() {
  swapXY = !swapXY;
  const btn = document.getElementById('swapBtn');
  btn.classList.toggle('swap-active', swapXY);
  btn.textContent = swapXY ? 'Y\u2194X' : 'X\u2194Y';
  if (!lastRaw) return;
  lastGroups = groupByY(parseCSV(lastRaw));
  document.getElementById('gridBody').innerHTML = renderGrid(lastGroups);
  updateTotalBar();
  if (mapVisible) { mapNeedsInit = true; drawMap(); }
}
function toggleMap() {
  mapVisible = !mapVisible;
  document.getElementById('mapBtn').classList.toggle('active', mapVisible);
  document.getElementById('listPane').style.display = mapVisible ? 'none' : '';
  document.getElementById('mapPane').style.display = mapVisible ? 'block' : 'none';
  if (mapVisible) { mapNeedsInit = true; requestAnimationFrame(() => requestAnimationFrame(drawMap)); }
}
function goBack() {
  if (mapVisible) { mapVisible = false; document.getElementById('mapBtn').classList.remove('active'); document.getElementById('listPane').style.display=''; document.getElementById('mapPane').style.display='none'; }
  document.getElementById('viewScreen').style.display = 'none';
  document.getElementById('importScreen').style.display = 'block';
}
function pasteClipboard() {
  if (navigator.clipboard && navigator.clipboard.readText) {
    navigator.clipboard.readText().then(text => {
      if (text) {
        document.getElementById('csvText').value = text;
      } else {
        alert('Zwischenablage ist leer.');
      }
    }).catch(() => {
      // Fallback: focus textarea so user can paste manually
      const ta = document.getElementById('csvText');
      ta.focus();
      ta.select();
      alert('Bitte manuell einfuegen (lange tippen -> Einsetzen).');
    });
  } else {
    const ta = document.getElementById('csvText');
    ta.focus();
    alert('Bitte manuell einfuegen (lange tippen -> Einsetzen).');
  }
}

function parseAndShow() {
  document.getElementById('errBox').style.display = 'none';
  const raw = document.getElementById('csvText').value.trim();
  if (!raw) { const b=document.getElementById('errBox'); b.textContent='Kein Inhalt.'; b.style.display='block'; return; }
  try {
    lastRaw = raw; doneSet.clear(); mapNeedsInit = true;
    hiddenTabs.clear(); hiddenGroups.clear(); hiddenKgGroups.clear();
    const allMotors = parseCSV(raw);
    // Auto-enable trim/basket fields if data present
    const hasTrim = allMotors.some(m => m.trim && m.trim !== '');
    showFields.trim = true;
    const btnTrim = document.getElementById('fld-trim');
    if (btnTrim) btnTrim.classList.toggle('active-field', hasTrim);
    updateTabBar(allMotors);
    updateGroupBar(allMotors);
    updateKgBar(allMotors);
    lastGroups = groupByY(allMotors);
    updateTotalBar();
    document.getElementById('gridBody').innerHTML = renderGrid(lastGroups);
    document.getElementById('importScreen').style.display = 'none';
    document.getElementById('viewScreen').style.display = 'flex';

  } catch(e) {
    const b=document.getElementById('errBox'); b.textContent=e.message; b.style.display='block';
  }
}

// ---------------------------------------------
// MAP INTERACTION (pan + pinch zoom)
// ---------------------------------------------
(function() {
  const el = document.getElementById('mapPane');
  el.addEventListener('mousedown', e => { if (!mapVisible) return; mapDragging=true; mapDragX=e.clientX; mapDragY=e.clientY; });
  document.addEventListener('mousemove', e => {
    if (!mapDragging) return;
    mapOffX += e.clientX-mapDragX; mapOffY += e.clientY-mapDragY;
    mapDragX=e.clientX; mapDragY=e.clientY; drawMap();
  });
  document.addEventListener('mouseup', () => { mapDragging=false; });
  el.addEventListener('wheel', e => {
    if (!mapVisible) return; e.preventDefault();
    mapScale *= e.deltaY < 0 ? 1.1 : 0.9;
    mapScale = Math.max(0.2, Math.min(20, mapScale));
    drawMap();
  }, {passive:false});
  el.addEventListener('touchstart', e => {
    if (!mapVisible) return;
    if (e.touches.length===1) { mapDragging=true; mapDragX=e.touches[0].clientX; mapDragY=e.touches[0].clientY; }
    if (e.touches.length===2) {
      mapDragging=false;
      const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      mapPinchDist=Math.sqrt(dx*dx+dy*dy);
    }
  }, {passive:true});
  el.addEventListener('touchmove', e => {
    if (!mapVisible) return;
    if (e.touches.length===1 && mapDragging) {
      mapOffX+=e.touches[0].clientX-mapDragX; mapOffY+=e.touches[0].clientY-mapDragY;
      mapDragX=e.touches[0].clientX; mapDragY=e.touches[0].clientY; drawMap();
    }
    if (e.touches.length===2) {
      const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY;
      const d=Math.sqrt(dx*dx+dy*dy);
      if (mapPinchDist>0) { mapScale*=d/mapPinchDist; mapScale=Math.max(0.2,Math.min(20,mapScale)); drawMap(); }
      mapPinchDist=d;
    }
  }, {passive:true});
  el.addEventListener('touchend', () => { mapDragging=false; mapPinchDist=0; });
})();

// File input
document.getElementById('fileInput').addEventListener('change', function(e) {
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=ev=>{document.getElementById('csvText').value=ev.target.result; parseAndShow();}; r.readAsText(f);
});
const da=document.getElementById('dropArea');
da.addEventListener('dragover',e=>e.preventDefault());
da.addEventListener('drop',e=>{
  e.preventDefault();
  const f=e.dataTransfer.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=ev=>{document.getElementById('csvText').value=ev.target.result; parseAndShow();}; r.readAsText(f);
});


function applyFiltersAndRender() {
  if (!lastRaw) return;
  const all = parseCSV(lastRaw);
  updateTabBar(all);
  lastGroups = groupByY(all.filter(m => !hiddenTabs.has(extractPrefix(m))));
  document.getElementById('gridBody').innerHTML = renderGrid(lastGroups);
  updateTotalBar();
  if (mapVisible) { mapNeedsInit = true; drawMap(); }
}

function toggleSnap() {
  snapY = !snapY;
  const btn = document.getElementById('snapBtn');
  if (btn) {
    btn.textContent = snapY ? 'XY +/- 0,05 aktiv' : 'XY +/- 0,05';
    btn.classList.toggle('active', snapY);
  }
  if (lastRaw) applyFiltersAndRender();
}

// -- OFFSET --
function showOffsetDialog() {
  document.getElementById('offX').value = refOffsetX;
  document.getElementById('offY').value = refOffsetY;
  document.getElementById('offsetDlg').style.display = 'flex';
}
function applyOffset() {
  refOffsetX = parseFloat(document.getElementById('offX').value) || 0;
  refOffsetY = parseFloat(document.getElementById('offY').value) || 0;
  document.getElementById('offsetDlg').style.display = 'none';
  const btn = document.querySelector('button[onclick="showOffsetDialog()"]');
  if (btn) btn.classList.toggle('active', refOffsetX !== 0 || refOffsetY !== 0);
  if (lastRaw) applyFiltersAndRender();
}
function resetOffset() {
  refOffsetX = 0; refOffsetY = 0;
  document.getElementById('offX').value = 0;
  document.getElementById('offY').value = 0;
  const btn = document.querySelector('button[onclick="showOffsetDialog()"]');
  if (btn) btn.classList.remove('active');
  if (lastRaw) applyFiltersAndRender();
}

// -- PDF --
function showPDFDialog() {
  document.getElementById('pdfDlg').style.display = 'flex';
}

function doPDF(mode) {
  document.getElementById('pdfDlg').style.display = 'none';
  exportPDF(mode);
}

function exportPDF(mode) {
  const listPane = document.getElementById('listPane');
  const mapPane  = document.getElementById('mapPane');

  if (mode === 'map') {
    // Temporarily show map, hide list
    listPane.style.display = 'none';
    mapPane.style.display  = 'block';
    const canvas = document.getElementById('mapCanvas');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    mapNeedsInit  = true;
    drawMap();
  } else {
    listPane.style.display = 'block';
    mapPane.style.display  = 'none';
  }

  // Print then restore
  window.print();

  // Restore original view state after print
  setTimeout(() => {
    if (mapVisible) {
      listPane.style.display = 'none';
      mapPane.style.display  = 'block';
    } else {
      listPane.style.display = 'block';
      mapPane.style.display  = 'none';
    }
  }, 500);
}

<script>
// Service Worker for offline PWA
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'bigrig-markout-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./', location.href])));
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
    const clone = res.clone();
    caches.open(CACHE).then(c => c.put(e.request, clone));
    return res;
  }).catch(() => caches.match('./'))));
});
  `;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).then(() => {
    URL.revokeObjectURL(url);
  });
}
</script>
